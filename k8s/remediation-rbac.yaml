apiVersion: v1
kind: ServiceAccount
metadata:
  name: aiops-remediation-sa
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aiops-remediation-role
  namespace: default
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "list", "patch", "update"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aiops-remediation-rolebinding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: aiops-remediation-sa
    namespace: default
roleRef:
  kind: Role
  name: aiops-remediation-role
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aiops-node-metrics-reader
rules:
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aiops-node-metrics-reader-binding
subjects:
  - kind: ServiceAccount
    name: aiops-remediation-sa
    namespace: default
roleRef:
  kind: ClusterRole
  name: aiops-node-metrics-reader
  apiGroup: rbac.authorization.k8s.io
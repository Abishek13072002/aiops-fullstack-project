apiVersion: v1
kind: ServiceAccount
metadata:
  name: aiops-remediation-sa
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aiops-remediation-role
  namespace: default
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "list", "patch", "update"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aiops-remediation-rolebinding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: aiops-remediation-sa
    namespace: default
roleRef:
  kind: Role
  name: aiops-remediation-role
  apiGroup: rbac.authorization.k8s.io
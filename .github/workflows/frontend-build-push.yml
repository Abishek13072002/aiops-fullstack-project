name: Build and Push Frontend to ECR

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push frontend image
        run: |
          docker build -t aiops-frontend ./frontend
          docker tag aiops-frontend:latest 859925121306.dkr.ecr.ap-south-1.amazonaws.com/aiops-frontend:latest
          docker push 859925121306.dkr.ecr.ap-south-1.amazonaws.com/aiops-frontend:latest
name: Build and Push Backend to ECR

on:
  push:
    branches:
      - main

jobs:
  backend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        run: |
          docker build -t aiops-backend ./backend
          docker tag aiops-backend:latest 859925121306.dkr.ecr.ap-south-1.amazonaws.com/aiops-backend:latest
          docker push 859925121306.dkr.ecr.ap-south-1.amazonaws.com/aiops-backend:latest